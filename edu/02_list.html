<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Tag</title>
</head>
<body>
  <!-- ul, li 태그: 순서가 없는 목록을 표현할 때 사용 -->
  <!-- <li> 태그는 독립적으로 사용할 수 없고, <ul> 태그의 하위에 위치 -->
  <ul>
    <li>1번</li>
    <li>2번</li>
    <li>3번</li>
  </ul>
</body>
</html>
