<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Tag</title>
</head>
<body>
  <!-- 절대경로 -->
  <!-- root로 부터 특정 파일까지의 전체 경로(고유한 경로) -->
  <img src="E:\노호준-MSA4\workspace\msa4-html\edu\dog1.jpg" alt="재롱이1">
  
  <!-- 상대경로 -->
  <!-- 현재 문서를 기준으로 해당 파일의 경로를 인식 -->
  <img src="/dog1.jpg" alt="재롱이1"> <!-- 웹 서버에서 가져옴 -->
  <img src="./dog1.jpg" alt="재롱이1" width="200px" height="200px"> <!-- 현재 폴더 내에서 가져옴 -->
  <img src="../img/dog2.jpg" alt="재롱이1"> <!-- 상위폴더에서 가져옴 -->
</body>
</html>
