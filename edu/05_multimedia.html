<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Tag</title>
</head>
<body>
  <!-- audio 태그: 웹 문서에 소리 콘텐츠를 삽입 -->
   <audio src="./multimedia.mp4" controls></audio>

   <!-- video 태그: 웹 문서에 비디오 콘텐츠를 삽입 -->
   <!-- muted : 동영상 음소거 -->
   <!-- autoplay : 자동재생 -->
   <!-- poster : 동영상 썸네일 부여 -->
   <video src="./multimedia.mp4" poster="./dog1.jpg" controls width="200px" muted></video>

</body>
</html>
