<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Tag</title>
</head>
<body>
  <!-- H 태그 : 제목 또는 부제목 태그 -->
  <h1>h1 tag</h1>
  <h2>h2 tag</h2>
  <h3>h3 tag</h3>
  <h4>h4 tag</h4>
  <h5>h5 tag</h5>
  <h6>h6 tag</h6>
  
  <!-- hr 태그: 가로선 그을 때 사용 -->
  <hr>

  <!-- br 태그: 개행 할 때 사용 -->
  동해~<br>백두산~

  <!-- p 태그: 하나의 문단을 표시할 때 사용 -->
  <p>첫번 째 문단입니다.</p> 
  <p>두번 째 문단입니다.</p>

  <!-- strong, b 태그: 텍스트를 진하게 표시(강조)할 때 사용 -->
  <!-- <strong> Tag의 경우, 화면낭독기에서 강조 해준다. -->

  <strong>스트롱</strong> 
  <b>비</b>

  <!-- em, i 태그: 텍스트를 이텔릭체로 표시*강조)할 때 사용 -->
  <!-- <em> Tag의 경우, 화면낭독기에서 강조 해준다. -->
  <em>이엠 태그</em>
  <i>아이 태그</i>


</body>
</html>
