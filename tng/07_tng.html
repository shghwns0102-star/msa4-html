<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Tng</title>
</head>
<body>
  <h1>회원가입을 환영합니다</h1>
  <form action="" method="get">
    <fieldset>
      <legend>사용자 정보</legend>
      <ul>
        <li>
          <label for="account">아이디 </label>
          <input 
            type="text" 
            id="account" 
            minlength="4" 
            maxlength="10" 
            placeholder="4자 ~ 10자 사이, 공백없이"
          >
        </li>
        <li>
          <label for="email">이메일</label>
          <input type="email" id="email">
        </li>
        <li>
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="문자와 숫자, 특수 기호 포함">          
        </li>
        <li>
          <label for="passwordIdt">비밀번호 확인</label>
          <input type="password" id="passwordIdt">          
        </li>
        <li>
          <label for="route">가입경로</label>
          <select name="route" id="route">
            <option value="homepage">홈페이지</option>
            <option value="etc" selected>기타</option>
          </select>          
        </li>
        <li>
          <label for="memo">메모</label>
          <textarea name="memo" 
          id="memo" 
          rows="10" 
          cols="30"
          placeholder="말씀이 있다면여기에"></textarea>
        </li>
      </ul>
    </fieldset>
    <fieldset>
      <legend>이벤트와 새로운 소식</legend>
      <div>
        <input type="radio" name="mail" id="y" value="y">
        <label for="y">메일 수신</label>
        <input type="radio" name="mail" id="n" value="n" checked>
        <label for="n">메일 수신 안 함</label>
      </div>
    </fieldset>
    <button type="submit">가입하기</button>
    <button type="reset">취소</button>
  </form>  
</body>
</html>
